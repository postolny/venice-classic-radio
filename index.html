<!doctype html>
<html>

<head>
  <meta charset="utf-8">
  <title>Радиостанция Venice Classic Radio Italia</title>
  <meta name="description" content="Классическая музыка.">
  <meta name="author" content="Игорь Постольный">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta property="og:title" content="Радиостанция Venice Classic Radio Italia" />
  <meta property="og:description" content="Классическая музыка." />
  <link rel="stylesheet" type="text/css" href="style.css">
  <script src="https://ajax.googleapis.com/ajax/libs/jquery/1.11.3/jquery.min.js"></script>
  <script src="script.js"></script>
</head>

<body>
  <main>
    <fieldset>
      <legend>Радиостанция Venice Classic Radio Italia</legend>
      <audio preload="none" id="player" src="https://uk2.streamingpulse.com/ssl/vcr1" type="audio/mpeg"></audio>
      <div class="controls">
        <div>
          <a href="#" class="play"></a>
        </div>
        <div id="range">
          <input id="volumeSlider" type="range" min="0" max="1" step="0.1" value="0.3" />
        </div>
        <div id="btns-left">
          <a href="#" class="btn-info"></a>
          <a href="https://postolny.github.io/" class="btn-home">
            <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 50 50">
              <path fill="currentColor" d="M9.27 19h3.916l.602 18H8.749zM6 38h38v2h3v3h2v2H1v-2h2v-3h3zm40-24.188L25.002 5L4 13.812V15h42zM8 16h34v2H8zm28.736 3h3.914l.607 18h-5.046zm-9.152 0h3.914l.6 18h-5.041zm-9.154 0h3.915l.596 18h-5.039z" />
            </svg>
          </a>
        </div>
      </div>
    </fieldset>
    <div id="pl">
      <fieldset>
        <legend>Текущий трек</legend>
        <div>
          <label>Композитор:</label>
          <span id="art">Загрузка...</span>
        </div>
        <div>
          <label>Сочинение:</label>
          <span id="tit">Загрузка...</span>
        </div>
        <div>
          <label>Части:</label>
          <span id="mov">Загрузка...</span>
        </div>
        <div>
          <label>Исполнители:</label>
          <span id="int">Загрузка...</span>
        </div>
        <div>
          <label>Продолжительность:</label>
          <span id="dur">Загрузка...</span>
        </div>
      </fieldset>
      <fieldset>
        <legend>Следующий трек</legend>
        <div>
          <label>Композитор:</label>
          <span id="art-next">Загрузка...</span>
        </div>
        <div>
          <label>Сочинение:</label>
          <span id="tit-next">Загрузка...</span>
        </div>
        <div>
          <label>Части:</label>
          <span id="mov-next">Загрузка...</span>
        </div>
        <div>
          <label>Исполнители:</label>
          <span id="int-next">Загрузка...</span>
        </div>
        <div>
          <label>Продолжительность:</label>
          <span id="dur-next">Загрузка...</span>
        </div>
      </fieldset>
      <div id="info">
        <div id="art1">Загрузка...</div>
        <div id="tit1">Загрузка...</div>
      </div>
    </div>
  </main>
</body>

</html>
